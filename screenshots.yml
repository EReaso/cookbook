# Screenshots configuration for automated CI frontend capture.
#
# Each entry under `pages` describes one URL to screenshot.
#
#   path     – URL path relative to the server root (required).
#   filename – output filename without extension (optional; derived from the
#              URL path when omitted, e.g. /recipes/new/ -> recipes_new).
#   exempt   – set to true to skip this page (e.g. pages still in development).
#
# The `seed_data` section configures the sample database used when the script
# starts its own in-process test server.  If omitted the database is left empty.
#
#   seed_data.ingredients – list of Ingredient rows (slug, name, density?).
#   seed_data.recipes     – list of Recipe rows; each may include a nested
#                           `recipe_ingredients` list whose entries reference an
#                           ingredient_slug defined in `seed_data.ingredients`.
#
# Screenshots are saved to the `screenshots/` directory and uploaded as a CI
# artifact named `frontend-screenshots`.

pages:
  - path: /recipes/new/
    filename: new_recipe
    
  - path: /book/classic_pancakes/
  - path: /book/tomato_soup
  - path: /recipes/
seed_data:
  ingredients:
    - slug: all_purpose_flour
      name: All Purpose Flour
      density: 0.53
    - slug: eggs
      name: Eggs
    - slug: milk
      name: Milk
      density: 1.03
    - slug: butter
      name: Butter
      density: 0.91
    - slug: sugar
      name: Sugar
      density: 0.85
    - slug: tomatoes
      name: Tomatoes

  recipes:
    - slug: classic_pancakes
      name: Classic Pancakes
      prep_time: 5
      cook_time: 15
      servings: 4
      directions: "1. Mix dry ingredients.\n2. Whisk in wet ingredients.\n3. Cook on griddle."
      recipe_ingredients:
        - ingredient_list: main
          amount: 1.5
          unit: cup
          ingredient_slug: all_purpose_flour
        - ingredient_list: main
          amount: 2.0
          ingredient_slug: eggs
        - ingredient_list: main
          amount: 1.0
          unit: cup
          ingredient_slug: milk
        - ingredient_list: main
          amount: 2.0
          unit: tbsp
          ingredient_slug: butter

    - slug: tomato_soup
      name: Tomato Soup
      prep_time: 10
      cook_time: 30
      servings: 2
      directions: "1. Sauté tomatoes.\n2. Blend smooth.\n3. Season to taste."
      recipe_ingredients:
        - ingredient_list: main
          amount: 6.0
          ingredient_slug: tomatoes

    - slug: simple_cake
      name: Simple Cake
      prep_time: 20
      cook_time: 35
      cook_temp: 350
      servings: 8
      directions: "1. Cream butter and sugar.\n2. Add eggs and flour.\n3. Bake until done."
      recipe_ingredients:
        - ingredient_list: main
          amount: 2.0
          unit: cup
          ingredient_slug: all_purpose_flour
        - ingredient_list: main
          amount: 1.0
          unit: cup
          ingredient_slug: sugar
        - ingredient_list: main
          amount: 0.5
          unit: cup
          ingredient_slug: butter
        - ingredient_list: main
          amount: 3.0
          ingredient_slug: eggs
