[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
live_server_scope = function
live_server_port = 0
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
markers =
    e2e: Browser end-to-end tests using Playwright
filterwarnings =
    ignore::DeprecationWarning
