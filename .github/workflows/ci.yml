name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}

      - run: uvx ruff format --check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements-dev.txt') }}

      - name: Install deps
        run: |
          uv venv --python $PYTHON_VERSION
          uv pip install --upgrade -r requirements-dev.txt

      - name: Install browsers
        run: uv run playwright install --with-deps chromium

      - name: Test
        run: uv run pytest tests -q

  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: astral-sh/setup-uv@v5

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements-dev.txt') }}

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: |
          uv venv --python $PYTHON_VERSION
          uv pip install --upgrade -r requirements-dev.txt
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Install browsers
        run: uv run playwright install --with-deps chromium

      - name: Generate screenshots
        run: uv run python scripts/take_screenshots.py

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Commit screenshots
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add screenshots/

          if git diff --cached --quiet -- screenshots/; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update screenshots [skip ci]"
          git push