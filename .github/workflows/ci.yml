name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - ereaso-create-recipes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Lint
        run: |
          python -m ruff format --check .

      - name: Test
        run: |
          python -m pytest tests -q

  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-and-lint
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: corepack enable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build SCSS
        run: |
          pnpm run build

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Generate screenshots
        run: |
          python scripts/take_screenshots.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: frontend-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Commit screenshots on main push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          if git diff --cached --quiet -- screenshots/; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update screenshots [skip ci]"
          git push
