name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ereaso/ci-base:latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: uvx ruff format --check .

  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ereaso/ci-base:latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install Python dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Test
        run: pytest tests -q

  screenshots:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ereaso/ci-base:latest
    timeout-minutes: 15
    needs: [lint, test]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements-dev.txt
          pnpm install --frozen-lockfile

      - name: Build SCSS
        run: pnpm run build

      - name: Generate screenshots
        run: python scripts/take_screenshots.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: frontend-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Commit screenshots on main push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          if git diff --cached --quiet -- screenshots/; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update screenshots [skip ci]"
          git push