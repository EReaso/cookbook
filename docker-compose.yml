services:
  web:
    build: .
    container_name: cookbook-web
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://cookbook:cookbook_password@db:5432/cookbook}
      SECRET_KEY: ${SECRET_KEY:-dev}
      FLASK_APP: wsgi.py
    ports:
      - "5000:5000"
    networks:
      - cookbook_network
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./wsgi.py:/app/wsgi.py
      - instance_data:/app/instance

  db:
    image: postgres:16-alpine
    container_name: cookbook-postgres
    profiles: ["local"]
    environment:
      POSTGRES_DB: cookbook
      POSTGRES_USER: cookbook
      POSTGRES_PASSWORD: cookbook_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookbook"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cookbook_network

volumes:
  postgres_data:
  instance_data:

networks:
  cookbook_network:
    driver: bridge